<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>SmartCampus - Connexion</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap');
        body { font-family: 'Inter', sans-serif; background: #f3f4f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.1); width: 320px; }
        h2 { text-align: center; color: #0056b3; font-weight: 800; font-size: 1.6rem; margin-bottom: 25px; margin-top: 0; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border-radius: 6px; border: 1px solid #d1d5db; box-sizing: border-box; font-family: 'Inter', sans-serif; }
        input:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.2); }
        button { width: 100%; background: #3b82f6; color: white; padding: 12px; border: none; border-radius: 6px; cursor: pointer; font-weight: 600; font-family: 'Inter', sans-serif; transition: 0.2s; }
        button:hover { background: #2563eb; }
    </style>
</head>
<body>
<div class="login-box">
    <h2>SMARTCAMPUS</h2>
    <form action="connexion.php" method="POST">
        <input type="email" name="email" required placeholder="Email académique">
        <input type="password" name="password" required placeholder="Mot de passe">
        <button type="submit">Se connecter</button>
    </form>
</div>
<script>
    const urlParams = new URLSearchParams(window.location.search);
    const erreur = urlParams.get('erreur');
    if (erreur === 'mdp') alert(" Mot de passe incorrect.");
    else if (erreur === 'email') alert(" Aucun compte trouvé avec cet email.");
</script>
</body>
</html>
